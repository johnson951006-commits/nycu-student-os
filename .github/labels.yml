# --- risk (QS §1.6) ---
- name: "risk:R1"
  color: "b42318"
  description: "Existential risk"
- name: "risk:R2"
  color: "dc6803"
  description: "Trust-eroding risk"
- name: "risk:R3"
  color: "d9a507"
  description: "Experience risk"
- name: "risk:R4"
  color: "98a2b3"
  description: "Cosmetic risk"

# --- severity (QS §1.7) ---
- name: "sev:S1"
  color: "b42318"
  description: "Data loss / security / crash-on-launch / missed deadline"
- name: "sev:S2"
  color: "d92d20"
  description: "Core flow broken, no workaround"
- name: "sev:S3"
  color: "dc6803"
  description: "Feature impaired, workaround exists"
- name: "sev:S4"
  color: "d9a507"
  description: "Cosmetic / minor"

# --- priority (QS §1.8) ---
- name: "prio:P0"
  color: "b42318"
  description: "Fix before anything else"
- name: "prio:P1"
  color: "d92d20"
  description: "Current release train"
- name: "prio:P2"
  color: "dc6803"
  description: "Next train"
- name: "prio:P3"
  color: "98a2b3"
  description: "Backlog"

# --- workflow ---
- name: "flag:behind-flag"
  color: "7a5af8"
  description: "Behavior gated by a feature flag"
- name: "blocked"
  color: "101828"
  description: "Blocked by a dependency or open item"
- name: "needs-adr"
  color: "6938ef"
  description: "Requires an Architecture Decision Record"
- name: "needs-design(D-3)"
  color: "ee46bc"
  description: "Blocked on the D-3 design addendum"

