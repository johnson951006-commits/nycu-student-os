# Label taxonomy (BEP §1.4) — synced to the repository by .github/workflows/labels-sync.yml.
# Labels drive path-based CI suite selection (QS §12) and triage SLAs (QS §15.8).

# --- type ---
- name: "type:feat"
  color: "1a5fd0"
  description: "New feature work"
- name: "type:fix"
  color: "d92d20"
  description: "Bug fix"
- name: "type:chore"
  color: "667085"
  description: "Maintenance / tooling"
- name: "type:docs"
  color: "0e9188"
  description: "Documentation"
- name: "type:test"
  color: "6938ef"
  description: "Tests only"
- name: "type:infra"
  color: "344054"
  description: "Infrastructure / CI / IaC"

