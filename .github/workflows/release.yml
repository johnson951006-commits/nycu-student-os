# Release lane (QS §13/§14, FES §11.2): runs on release/* branches. Build matrix
# (Android appbundle + iOS ipa, flavors dev/staging/prod), Sentry symbol upload,
# token/ARB/flag audits, store-metadata lint, and the release regression + budget
# suites (RG-PERF · RG-SEC · RG-AX · k6 load · chaos smoke). Build/device steps
# activate once the app exists (INFRA-008); until then this lane is a passing stub.
name: release

on:
  push:
    branches: ['release/*']

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: corpus audits (token / ARB / flag registries) — real
        run: bash tooling/lints/corpus-lint.sh token_literals arb_coverage flag_registry
      - name: Build matrix + regression/budget suites
        run: |
          if [ ! -d app/lib ]; then
            echo "No client yet (INFRA-008) — build matrix + RG-PERF/RG-SEC/RG-AX + k6 + chaos are passing stubs."
          else
            echo "Android appbundle (obfuscated) x iOS ipa (dev/staging/prod); Sentry symbols; RG-PERF/SEC/AX; k6 load; chaos smoke; store-metadata lint."
          fi
